general:
  ping_interval: 30
  ping_count: 5
  ping_timeout: 5
  data_retention_days: 90
  max_user_target_lifetime_days: 7

# interfaces — list the network interfaces available on this host.
# Each entry has a machine name (used by the OS / ping -I), a human-readable
# alias shown in the dashboard, and the IPv4 address bound to that interface.
# This section is optional. When present, the dashboard offers a drop-down
# so users can choose which interface to use for each monitored target.
# NOTE: interface names below (e.g. "eth0") are placeholders — replace them
# with the actual interface names on your system. Run `ip link` (Linux) or
# `ifconfig` (macOS/BSD) to list your interfaces (common names: eth0, enp3s0,
# ens3, en0, wlan0, etc.).
interfaces:
  - name: "eth0"         # replace with your actual interface name
    alias: "Primary LAN"
    ipv4: "192.168.1.100"
  # - name: "eth1"       # replace with your actual interface name
  #   alias: "Management NIC"
  #   ipv4: "10.0.0.1"
  # - name: "wlan0"      # replace with your actual interface name
  #   alias: "Wi-Fi"
  #   ipv4: "192.168.1.150"

targets:
  - name: "Google DNS"
    ip: "8.8.8.8"
    group: "DNS Servers"
    interface: "eth0" # optional: outgoing interface name — must match a 'name' entry in the interfaces section above (replace "eth0" with your real interface name)
  - name: "Cloudflare DNS"
    ip: "1.1.1.1"
    group: "DNS Servers"
    # interface: "eth0"          # omit to use the default system interface
  - name: "Core Router"
    ip: "192.168.1.1"
    group: "Local Network"
    # interface: "eth1"          # use a specific interface when multiple NICs are present

alerts:
  email_notifications: true
  smtp:
    host: "smtp.gmail.com"
    port: 587
    secure: false
    user: "you@gmail.com"
    pass: "app-password"
    from: "n8watch <monitor@yourdomain.com>"
    to:
      - "admin@yourdomain.com"

  rules:
    - name: "Host Down"
      condition: "packet_loss == 100"
      severity: "critical"
      cooldown: 300
      # targets: apply to all targets (default — omit field or leave empty)
    - name: "High Packet Loss"
      condition: "packet_loss > 20"
      severity: "warning"
      cooldown: 600
      # targets_operator controls how the targets list is applied:
      #   "include" (default) — alert only for the listed targets
      #   "exclude"           — alert for all targets EXCEPT the listed ones
      # targets:
      #   - "Google DNS"
      #   - "Cloudflare DNS"
    - name: "High Latency"
      condition: "avg_latency > 200"
      severity: "warning"
      cooldown: 600
      # targets_operator: "exclude"   # fire for all targets except those listed below
      # targets:
      #   - "Core Router"
    - name: "High Jitter"
      condition: "jitter > 50"
      severity: "warning"
      cooldown: 600

server:
  port: 3000
  host: "0.0.0.0"
  # ssl:                                   # Uncomment to enable HTTPS
  #   enabled: true
  #   cert: "/etc/ssl/certs/n8watch.crt"   # Path to the PEM-encoded certificate
  #   key:  "/etc/ssl/private/n8watch.key" # Path to the PEM-encoded private key
  #   # ca: "/etc/ssl/certs/ca-chain.crt"  # Optional: CA bundle for self-signed certs
  #   # redirect_http: 80                  # Optional: start an HTTP server on this port that
  #   #                                    # redirects all requests to HTTPS automatically.
  #
  # Typical HTTPS setup (port 443 requires root or CAP_NET_BIND_SERVICE):
  # port: 443
  # host: "0.0.0.0"
  # ssl:
  #   enabled: true
  #   cert: "/etc/letsencrypt/live/yourdomain.com/fullchain.pem"
  #   key:  "/etc/letsencrypt/live/yourdomain.com/privkey.pem"
  #   redirect_http: 80                    # redirect plain HTTP on port 80 → HTTPS on port 443

# security — IP-based access control for the API and admin interface.
# localhost (127.0.0.1 / ::1) is ALWAYS allowed regardless of this setting,
# so you can never accidentally lock yourself out.
# When ip_allowlist.enabled is false (default), all traffic is permitted.
security:
  ip_allowlist:
    enabled: false
    entries:
      - address: "192.168.1.0/24"   # CIDR notation — entire subnet
        allow_admin: true            # allow_admin: true → this IP range can also access /api/admin
      - address: "10.0.0.5"         # single IP address
        allow_admin: false
      # - address: "10.0.1.10-10.0.1.20"  # IPv4 range
      #   allow_admin: false

# dashboard — controls which sections are visible on the main dashboard.
# All sections are shown by default. Set a value to false to hide that section.
dashboard:
  visibility:
    summary: true   # Summary cards (up/down counts, avg latency…)
    chart: true     # Network latency / packet-loss chart
    groups: true    # Grouped target view
    hosts: true     # Individual host cards
