general:
  ping_interval: 30
  ping_count: 5
  ping_timeout: 5
  data_retention_days: 90

# interfaces — list the network interfaces available on this host.
# Each entry has a machine name (used by the OS / ping -I), a human-readable
# alias shown in the dashboard, and the IPv4 address bound to that interface.
# This section is optional. When present, the dashboard offers a drop-down
# so users can choose which interface to use for each monitored target.
interfaces:
  - name: "eth0"
    alias: "Primary LAN"
    ipv4: "192.168.1.100"
  # - name: "eth1"
  #   alias: "Management NIC"
  #   ipv4: "10.0.0.1"
  # - name: "wlan0"
  #   alias: "Wi-Fi"
  #   ipv4: "192.168.1.150"

targets:
  - name: "Google DNS"
    ip: "8.8.8.8"
    group: "DNS Servers"
    interface: "eth0" # optional: outgoing interface name (must match an entry in interfaces above)
  - name: "Cloudflare DNS"
    ip: "1.1.1.1"
    group: "DNS Servers"
    # interface: "eth0"          # omit to use the default system interface
  - name: "Core Router"
    ip: "192.168.1.1"
    group: "Local Network"
    # interface: "eth1"          # use a specific interface when multiple NICs are present

alerts:
  email_notifications: true
  smtp:
    host: "smtp.gmail.com"
    port: 587
    secure: false
    user: "you@gmail.com"
    pass: "app-password"
    from: "n8watch <monitor@yourdomain.com>"
    to:
      - "admin@yourdomain.com"

  rules:
    - name: "Host Down"
      condition: "packet_loss == 100"
      severity: "critical"
      cooldown: 300
      # targets: apply to all targets (default — omit field or leave empty)
    - name: "High Packet Loss"
      condition: "packet_loss > 20"
      severity: "warning"
      cooldown: 600
      # targets: apply to specific targets by name, IP, or numeric ID
      # targets:
      #   - "Google DNS"
      #   - "Cloudflare DNS"
    - name: "High Latency"
      condition: "avg_latency > 200"
      severity: "warning"
      cooldown: 600
      # targets:
      #   - "Core Router"
    - name: "High Jitter"
      condition: "jitter > 50"
      severity: "warning"
      cooldown: 600

server:
  port: 3000
  host: "0.0.0.0"
